<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory - ACSC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">ACSC</a>
            <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>
            <nav id="mainNav">
                <a href="index.html">Home</a>
                <a href="directory.html" class="active">Directory</a>
                <a href="events.html">Events</a>
                <a href="resources.html">Resources</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="galleryView">
            <div class="page-header">
                <h2>Member Directory</h2>
                <p>Search and connect with AuD/PhD professionals</p>
            </div>

            <div class="controls">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-bar" 
                    placeholder="Search by name, institution, research areas, mentoring topics..."
                >
                
                <div class="filters" id="filtersContainer"></div>
            </div>

            <div class="results-info" id="resultsInfo"></div>
            
            <div id="loading" class="loading">Loading directory...</div>
            <div class="directory-grid" id="directoryGrid"></div>
        </div>

        <div id="profileView" class="profile-view">
            <a href="#" class="back-button" onclick="showGallery(); return false;">← Back to Directory</a>
            <div id="profileContent"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ACSC. Built with ❤️ for the audiology community.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        let allPeople = [];
        let filteredPeople = [];
        
        const multiSelectFields = [
            'Current Professional Activities (check all that apply)',
            'Research Topic Area(s)',
            'Research Category (check all that apply)',
            'What funding mechanisms do you have experience with? (check all that apply)',
            'What level mentee do you typically work with?',
            'What professional topics would you be interested in providing mentoring on?'
        ];

        const cardFields = {
            name: 'Preferred Name, as it should be listed in the directory (e.g., Mary Smith, Au.D., Ph.D.)',
            photo: 'Profile Picture',
            position: 'Current Job Title (e.g, Assistant Professor; Research Audiologist)',
            institution: 'Current Affiliation (e.g., University of Colorado)',
            mentor: 'Do you agree to mentor individuals who reach out to you?'
        };

        const filterableFields = [
            'Research Category (check all that apply)',
            'Research Topic Area(s)',
            'Did you complete your AuD and PhD simultaneously or sequentially?',
            'Do you agree to mentor individuals who reach out to you?',
            'What professional topics would you be interested in providing mentoring on?',
            'What level mentee do you typically work with?',
            'Current Professional Activities (check all that apply)'
        ];

        // Fields that are URLs/links to display specially
        const linkFields = {
            'Personal LinkedIn': 'LinkedIn',
            'Lab/Personal Website': 'Website',
            'Lab/Personal other social media (e.g., BlueSky, Twitter)': 'Social Media',
            'Lab/Personal GitHub': 'GitHub',
            'Lab Instagram': 'Instagram',
            'Other relevant link(s)': 'Other Links'
        };

        const skipInDetailView = [
            'Timestamp',
            'Preferred Name, as it should be listed in the directory (e.g., Mary Smith, Au.D., Ph.D.)',
            'Profile Picture ',
            'Current Job Title (e.g, Assistant Professor; Research Audiologist)',
            'Current Affiliation (e.g., University of Colorado)',
            'Current Department (if applicable, e.g., Department of Communication Sciences and Disorders)',
            'Email address (best for contact)',
            'Year/Institution/Field for Masters (e.g., 2020/University of Pittsburgh/Clinical Audiology; if not applicable, enter: NA)',
            'Year/Institution for AuD  (e.g., 2020/University of Pittsburgh; if not applicable, enter: NA)',
            'Year/Institution/Field for PhD (e.g., 2020/University of Pittsburgh/Neuroscience; if not applicable, enter: NA)',
            'Year/Institution for Postdoc  (e.g., 2020/University of Pittsburgh; if not applicable, enter: NA)',
            'Did you complete your AuD and PhD simultaneously or sequentially?',
            'Do you agree to mentor individuals who reach out to you?',
            'FileName',
            'We are considering using this information for future studies about clinician-scientists. Do you agree to be contacted to participate if applicable in the future?'
        ];

        // Fields that should use checkboxes (allow multiple selections)
        const checkboxFilterFields = [
            'Research Topic Area(s)',
            'Research Category (check all that apply)',
            'What professional topics would you be interested in providing mentoring on?',
            'What level mentee do you typically work with?',
            'Current Professional Activities (check all that apply)'
        ];

        function toggleMobileMenu() {
            const nav = document.getElementById('mainNav');
            nav.classList.toggle('mobile-open');
        }

        // Images are loaded from the local `pictures/` folder using the CSV `FileName` column.

        async function loadData() {
            try {
                const response = await fetch('directory_data.csv');
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        allPeople = results.data.map(person => {
                            const processed = {...person};
                            
                            multiSelectFields.forEach(field => {
                                if (processed[field]) {
                                    processed[field] = processed[field]
                                        .split(/[,;]/)
                                        .map(item => item.trim())
                                        .filter(item => item && item !== 'NA');
                                }
                            });
                            
                            return processed;
                        });
                        
                        filteredPeople = allPeople;
                        initializeFilters();
                        renderDirectory();
                        document.getElementById('loading').style.display = 'none';
                    },
                    error: function(error) {
                        console.error('Error parsing CSV:', error);
                        document.getElementById('loading').innerHTML = 
                            'Error loading data. Please make sure directory_data.csv is in the same directory.';
                    }
                });
            } catch (error) {
                console.error('Error loading CSV:', error);
                document.getElementById('loading').innerHTML = 
                    'Error loading data. Please make sure directory_data.csv is in the same directory.';
            }
        }

        function initializeFilters() {
            const filtersContainer = document.getElementById('filtersContainer');

            filterableFields.forEach(field => {
                let uniqueValues = new Set();
                
                allPeople.forEach(person => {
                    if (Array.isArray(person[field])) {
                        person[field].forEach(v => v && uniqueValues.add(v));
                    } else if (person[field] && person[field] !== 'NA') {
                        uniqueValues.add(person[field]);
                    }
                });
                
                uniqueValues = Array.from(uniqueValues).filter(v => v);
                
                if (uniqueValues.length > 0) {
                    const filterGroup = document.createElement('div');
                    filterGroup.className = 'filter-group';
                    
                    const label = document.createElement('label');
                    const shortLabels = {
                        'Research Category (check all that apply)': 'Research Category',
                        'Research Topic Area(s)': 'Research Topics',
                        'Do you agree to mentor individuals who reach out to you?': 'Available to Mentor',
                        'What professional topics would you be interested in providing mentoring on?': 'Mentoring Topics',
                        'What level mentee do you typically work with?': 'Mentee Level',
                        'Did you complete your AuD and PhD simultaneously or sequentially?': 'Degree Timing',
                        'Current Professional Activities (check all that apply)': 'Professional Activities'
                    };
                    label.textContent = shortLabels[field] || field;
                    
                    filterGroup.appendChild(label);
                    
                    // Use checkboxes for multi-select fields
                    if (checkboxFilterFields.includes(field)) {
                        const checkboxContainer = document.createElement('div');
                        checkboxContainer.className = 'checkbox-container';
                        checkboxContainer.id = `filter-${field}`;
                        
                        uniqueValues.sort().forEach(value => {
                            const checkboxWrapper = document.createElement('label');
                            checkboxWrapper.className = 'checkbox-label';
                            
                            const checkbox = document.createElement('input');
                            checkbox.type = 'checkbox';
                            checkbox.value = value;
                            checkbox.addEventListener('change', applyFilters);
                            
                            checkboxWrapper.appendChild(checkbox);
                            checkboxWrapper.appendChild(document.createTextNode(' ' + value));
                            checkboxContainer.appendChild(checkboxWrapper);
                        });
                        
                        filterGroup.appendChild(checkboxContainer);
                    } else {
                        // Use dropdown for single-select fields
                        const select = document.createElement('select');
                        select.id = `filter-${field}`;
                        select.innerHTML = `<option value="">All</option>`;
                        
                        uniqueValues.sort().forEach(value => {
                            const option = document.createElement('option');
                            option.value = value;
                            option.textContent = value;
                            select.appendChild(option);
                        });
                        
                        select.addEventListener('change', applyFilters);
                        filterGroup.appendChild(select);
                    }
                    
                    filtersContainer.appendChild(filterGroup);
                }
            });
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredPeople = allPeople.filter(person => {
                const searchMatch = Object.entries(person).some(([key, value]) => {
                    if (Array.isArray(value)) {
                        return value.some(v => v.toLowerCase().includes(searchTerm));
                    }
                    return value && value.toString().toLowerCase().includes(searchTerm);
                });
                
                if (!searchMatch) return false;
                
                // Check all filters
                for (let field of filterableFields) {
                    const filterElement = document.getElementById(`filter-${field}`);
                    
                    if (!filterElement) continue;
                    
                    // Handle checkbox filters
                    if (checkboxFilterFields.includes(field)) {
                        const checkboxes = filterElement.querySelectorAll('input[type="checkbox"]:checked');
                        if (checkboxes.length > 0) {
                            const selectedValues = Array.from(checkboxes).map(cb => cb.value);
                            const personValues = Array.isArray(person[field]) ? person[field] : [person[field]];
                            
                            // Person must have at least one of the selected values
                            const hasMatch = selectedValues.some(val => personValues.includes(val));
                            if (!hasMatch) return false;
                        }
                    } else {
                        // Handle dropdown filters
                        const filterValue = filterElement.value;
                        if (filterValue) {
                            if (Array.isArray(person[field])) {
                                if (!person[field].includes(filterValue)) return false;
                            } else if (person[field] !== filterValue) {
                                return false;
                            }
                        }
                    }
                }
                
                return true;
            });
            
            renderDirectory();
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function renderDirectory() {
            const grid = document.getElementById('directoryGrid');
            const resultsInfo = document.getElementById('resultsInfo');
            
            resultsInfo.textContent = `Showing ${filteredPeople.length} of ${allPeople.length} people`;
            
            if (filteredPeople.length === 0) {
                grid.innerHTML = '<div class="no-results">No results found. Try adjusting your search or filters.</div>';
                return;
            }
            
            grid.innerHTML = filteredPeople.map((person, index) => {
                const fileName = person['FileName'] && person['FileName'] !== 'NA' ? person['FileName'].trim() : '';
                const photoUrl = fileName ? `pictures/${encodeURIComponent(fileName)}` : '';
                const name = person[cardFields.name] || 'Unknown';
                const position = person[cardFields.position] || '';
                const institution = person[cardFields.institution] || '';
                const isMentor = person[cardFields.mentor] && person[cardFields.mentor].toLowerCase().includes('yes');
                
                const initials = getInitials(name);
                
                const imageHtml = photoUrl ? 
                    `<img src="${photoUrl}" alt="${name}" class="card-image" onerror="this.outerHTML='<div class=\\'card-image\\'>${initials}</div>';">` :
                    `<div class="card-image">${initials}</div>`;
                
                return `
                    <div class="person-card" onclick="showProfile(${allPeople.indexOf(person)})">
                        ${imageHtml}
                        <div class="card-content">
                            <div class="card-name">${name}</div>
                            <div class="card-position">${position}</div>
                            <div class="card-institution">${institution}</div>
                            ${isMentor ? '<span class="mentor-badge">Available to Mentor</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function parseDegreeInfo(degreeString) {
            if (!degreeString || degreeString === 'NA' || degreeString.trim() === '') return null;
            
            // Format: Year/Institution/Field or Year/Institution
            const parts = degreeString.split('/').map(p => p.trim());
            if (parts.length >= 2) {
                return {
                    year: parts[0],
                    institution: parts[1],
                    field: parts[2] || null
                };
            }
            return null;
        }

        function formatDegreeEntry(degreeName, info, showSuperscript = false, superscriptSymbol = '') {
            if (!info) return '';
            
            let degreeText = degreeName;
            if (showSuperscript && superscriptSymbol) {
                degreeText += `<sup>${superscriptSymbol}</sup>`;
            }
            
            if (info.field) {
                return `<li><strong>${degreeText}</strong>, ${info.field}, ${info.institution}, ${info.year}</li>`;
            } else {
                return `<li><strong>${degreeText}</strong>, ${info.institution}, ${info.year}</li>`;
            }
        }

        function showProfile(personIndex) {
            const person = allPeople[personIndex];
            const fileName = person['FileName'] && person['FileName'] !== 'NA' ? person['FileName'].trim() : '';
            const photoUrl = fileName ? `pictures/${encodeURIComponent(fileName)}` : '';
            const name = person[cardFields.name] || 'Unknown';
            const position = person[cardFields.position] || '';
            const institution = person[cardFields.institution] || '';
            const department = person['Current Department (if applicable, e.g., Department of Communication Sciences and Disorders)'] || '';
            const email = person['Email address (best for contact)'] || '';
            
            const initials = getInitials(name);
            
            const imageHtml = photoUrl ? 
                `<img src="${photoUrl}" alt="${name}" class="profile-image" onerror="this.outerHTML='<div class=\\'profile-image\\'>${initials}</div>';">` :
                `<div class="profile-image">${initials}</div>`;
            
            // Build institution display with optional department
            const institutionDisplay = department ? `${institution}<br><small style="color: var(--sage-green);">${department}</small>` : institution;
            
            // Parse degree information - handle both single and double space versions
            const mastersInfo = parseDegreeInfo(person['Year/Institution/Field for Masters (e.g., 2020/University of Pittsburgh/Clinical Audiology; if not applicable, enter: NA)']);
            const audInfo = parseDegreeInfo(
                person['Year/Institution for AuD  (e.g., 2020/University of Pittsburgh; if not applicable, enter: NA)'] ||
                person['Year/Institution for AuD (e.g., 2020/University of Pittsburgh; if not applicable, enter: NA)']
            );
            const phdInfo = parseDegreeInfo(person['Year/Institution/Field for PhD (e.g., 2020/University of Pittsburgh/Neuroscience; if not applicable, enter: NA)']);
            const postdocInfo = parseDegreeInfo(
                person['Year/Institution for Postdoc  (e.g., 2020/University of Pittsburgh; if not applicable, enter: NA)'] ||
                person['Year/Institution for Postdoc (e.g., 2020/University of Pittsburgh; if not applicable, enter: NA)']
            );
            
            // Get simultaneous/sequential info
            const degreeTimingRaw = person['Did you complete your AuD and PhD simultaneously or sequentially?'] || '';
            const degreeTiming = degreeTimingRaw.toLowerCase().includes('simultaneous') ? 'simultaneous' : 
                                 degreeTimingRaw.toLowerCase().includes('sequential') ? 'sequential' : '';
            const superscriptSymbol = degreeTiming === 'simultaneous' ? '*' : degreeTiming === 'sequential' ? '+' : '';
            
            // Build education section
            let educationSection = '';
            if (mastersInfo || audInfo || phdInfo || postdocInfo) {
                educationSection = '<div class="detail-section"><div class="detail-label">Education</div><ul style="margin-left: 1.5rem; color: var(--chocolate-brown); line-height: 1.8;">';
                
                if (mastersInfo) educationSection += formatDegreeEntry('Masters', mastersInfo);
                if (audInfo) educationSection += formatDegreeEntry('AuD', audInfo, !!degreeTiming, superscriptSymbol);
                if (phdInfo) educationSection += formatDegreeEntry('PhD', phdInfo);
                if (postdocInfo) educationSection += formatDegreeEntry('Postdoc', postdocInfo);
                
                educationSection += '</ul>';
                
                // Add footnote if there's a timing indicator
                if (degreeTiming) {
                    const footnoteText = degreeTiming === 'simultaneous' ? 
                        '* AuD and PhD completed simultaneously' : 
                        '+ AuD and PhD completed sequentially';
                    educationSection += `<div style="font-size: 0.9rem; color: var(--chocolate-brown); margin-top: 0.5rem; font-style: italic;">${footnoteText}</div>`;
                }
                
                educationSection += '</div>';
            }
            
            // Collect social/web links
            const links = [];
            if (person['Personal LinkedIn'] && person['Personal LinkedIn'] !== 'NA') {
                links.push({ url: person['Personal LinkedIn'], label: 'LinkedIn', icon: 'linkedin' });
            }
            if (person['Lab/Personal Website'] && person['Lab/Personal Website'] !== 'NA') {
                links.push({ url: person['Lab/Personal Website'], label: 'Website', icon: 'website' });
            }
            if (person['Lab/Personal other social media (e.g., BlueSky, Twitter)'] && person['Lab/Personal other social media (e.g., BlueSky, Twitter)'] !== 'NA') {
                links.push({ url: person['Lab/Personal other social media (e.g., BlueSky, Twitter)'], label: 'Social Media', icon: 'social' });
            }
            if (person['Lab/Personal GitHub'] && person['Lab/Personal GitHub'] !== 'NA') {
                links.push({ url: person['Lab/Personal GitHub'], label: 'GitHub', icon: 'github' });
            }
            if (person['Lab Instagram'] && person['Lab Instagram'] !== 'NA') {
                links.push({ url: person['Lab Instagram'], label: 'Instagram', icon: 'instagram' });
            }
            if (person['Other relevant link(s)'] && person['Other relevant link(s)'] !== 'NA') {
                links.push({ url: person['Other relevant link(s)'], label: 'Other Links', icon: 'link' });
            }
            
            // Build link buttons section
            let linksSection = '';
            if (links.length > 0) {
                linksSection = '<div class="profile-links">';
                links.forEach(link => {
                    const iconMap = {
                        'linkedin': '💼',
                        'website': '🌐',
                        'social': '📱',
                        'github': '💻',
                        'instagram': '📷',
                        'link': '🔗'
                    };
                    const icon = iconMap[link.icon] || '🔗';
                    linksSection += `<a href="${link.url}" target="_blank" rel="noopener noreferrer" class="profile-link-btn">${icon} ${link.label}</a>`;
                });
                linksSection += '</div>';
            }
            
            // Build other detail sections
            const detailSections = Object.entries(person)
                .filter(([key]) => !skipInDetailView.includes(key) && !linkFields[key] && person[key] && person[key] !== 'NA' && person[key] !== '')
                .map(([key, value]) => {
                    let displayValue;
                    let displayLabel = key;
                    
                    // Rename "Provide any other relevant information"
                    if (key === 'Provide any other relevant information here. (e.g., did you work between degrees? have a non-traditional path to audiology?)') {
                        displayLabel = 'Other Details about Me';
                    }
                    
                    if (Array.isArray(value) && value.length > 0) {
                        displayValue = `
                            <div class="tag-list">
                                ${value.map(v => `<span class="tag">${v}</span>`).join('')}
                            </div>
                        `;
                    } else if (value) {
                        displayValue = `<div class="detail-value">${value}</div>`;
                    } else {
                        return '';
                    }
                    
                    return `
                        <div class="detail-section">
                            <div class="detail-label">${displayLabel}</div>
                            ${displayValue}
                        </div>
                    `;
                }).filter(s => s).join('');
            
            document.getElementById('profileContent').innerHTML = `
                <div class="profile-header">
                    ${imageHtml}
                    <div class="profile-info">
                        <div class="profile-name">${name}</div>
                        <div class="profile-position">${position}</div>
                        <div class="profile-institution">${institutionDisplay}</div>
                        ${email ? `<a href="mailto:${email}" class="profile-email">Contact via Email</a>` : ''}
                    </div>
                </div>
                <div class="profile-details">
                    ${educationSection}
                    ${detailSections}
                    ${linksSection}
                </div>
            `;
            
            document.getElementById('galleryView').style.display = 'none';
            document.getElementById('profileView').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showGallery() {
            document.getElementById('galleryView').style.display = 'block';
            document.getElementById('profileView').style.display = 'none';
            window.scrollTo(0, 0);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        loadData();
    </script>
</body>
</html>
